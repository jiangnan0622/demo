  <style>

    .step.current { color: #1d4ed8; }.step.current .step-dot { background: #2563eb; color: #fff; }

    .task-filters { display: grid; grid-template-columns: minmax(260px, 1.5fr) minmax(150px, .75fr) minmax(150px, .75fr) auto; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--line-soft); }
    .task-table table { min-width: 1060px; }.task-table td { padding-top: 14px; padding-bottom: 14px; vertical-align: middle; }.task-subject { max-width: 240px; }.task-actions { display: flex; gap: 10px; align-items: center; white-space: nowrap; }.task-sla { color: #475569; font-size: 12px; }.task-sla.overdue { color: #9f1d1d; font-weight: 700; }.task-owner { color: #334155; font-size: 13px; }.task-owner.unassigned { color: #94a3b8; }

    .tab.active { color: #2563eb; }.tab.active::after { position: absolute; right: 0; bottom: -1px; left: 0; height: 2px; background: #2563eb; content: ""; }

    .material-name { font-weight: 700; }.material-value { margin-top: 8px; color: #334155; font-size: 13px; line-height: 1.5; }

    const tagClass = (value) => {
      if (["已通过", "已满足", "已开通", "已完成", "正常", "低风险"].includes(value)) return "green";
      if (["审核中", "待复核", "待开通", "部分可用", "安全入口已生成"].includes(value)) return "blue";
      if (["待补件", "需补件", "待处理", "待企业提交", "待审核", "中风险"].includes(value)) return "amber";
      if (["已拒绝", "已驳回", "已暂停", "已冻结", "阻断", "高风险"].includes(value)) return "red";
      return "neutral";
    };
    const tag = (label) => `<span class="tag ${tagClass(label)}">${label}</span>`;
    const icon = (name) => ({
      building: `<svg viewBox="0 0 24 24"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18"/><path d="M2 14a2 2 0 0 1 2-2h2M18 12h2a2 2 0 0 1 2 2v8M2 22h20"/><path d="M10 6h4M10 10h4M10 14h4M10 18h4"/></svg>`,
      shield: `<svg viewBox="0 0 24 24"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>`,

    })[name];
    const brand = () => `<img class="brand-logo" src="assets/settleflow-pay-logo-transparent.png" alt="SettleFlow Pay" />`;

    function stats() {
      const passed = state.materials.filter(item => item.status === "已通过").length;
      const supplement = state.materials.filter(item => item.status === "需补件").length;
      const rejected = state.materials.filter(item => item.status === "已驳回").length;
      return { passed, supplement, rejected, pending: state.materials.length - passed - supplement - rejected };
    }

    function portalStatus() {
      if (state.kybStatus === "待补件") return "KYB 需补件";
      if (state.kybStatus === "已通过") return "KYB 已通过";
      if (state.kybStatus === "已拒绝") return "KYB 已拒绝";
      return "KYB 审核中";
    }

    function capabilitySummary() {
      const active = state.capabilities.filter(item => item.status === "已开通").length;
      if (active === state.capabilities.length && active > 0) return "已激活";
      if (active > 0) return "部分可用";
      if (state.capabilities.some(item => item.status === "待开通")) return "待开通";
      return "未激活";
    }

    function addLog(title, copy) {
      state.logs.unshift({ time: "2026-07-10 10:04", title, copy, user: "王宁" });
    }

    function currentTask() {
      return taskRecords.find(task => task.id === state.selectedTaskId) || null;
    }

    const adminRoles = ["管理员", "审核主管"];
    const reviewerRoles = ["审核员", "高级审核员"];
    const terminalTaskStatuses = ["已完成", "已拒绝", "已暂停"];
    const isAdmin = () => adminRoles.includes(currentUser.role);
    const isReviewer = () => reviewerRoles.includes(currentUser.role);
    const isTerminalTask = task => !task || terminalTaskStatuses.includes(task.status);
    const canManageAssignments = () => isAdmin();
    const canClaim = task => isReviewer() && task && task.assignee === "待分配" && !isTerminalTask(task);
    const canReview = task => task && task.assignee === currentUser.name && !isTerminalTask(task);

    function taskMerchant(task) {
      return merchantRecords.find(merchant => merchant.id === task.merchantId) || merchantRecords[0];
    }

    function taskLog(task, title, copy) {
      task.logs = task.logs || [];
      task.logs.unshift({ time: "2026-07-10 10:18", title, copy, user: currentUser.name });
      task.updatedAt = "2026-07-10 10:18";
    }

    function claimTask(id) {
      const task = taskRecords.find(item => item.id === id);
      if (!canClaim(task)) return setToast(isReviewer() ? "该任务已被领取或已结束" : "当前角色不能领取任务");
      task.assignee = currentUser.name;
      if (task.status === "待分配") task.status = "审核中";
      taskLog(task, "领取任务", `${currentUser.name} 领取了 ${task.type}。`);
      setToast("任务已领取");
    }

    function openAssignment(id, mode = "assign") {
      const task = taskRecords.find(item => item.id === id);
      if (!task || isTerminalTask(task)) return setToast("已结束任务仅支持查看");
      if (!canManageAssignments()) return setToast("当前角色无任务分配权限");
      state.modal = { type: "assign", id, mode };
      render();
    }

    function confirmAssignment() {
      const task = taskRecords.find(item => item.id === state.modal?.id);
      const mode = state.modal?.mode || "assign";
      if (!task || isTerminalTask(task) || !canManageAssignments()) return setToast("当前角色无法更新任务负责人");
      const reason = document.getElementById("assignment-reason")?.value.trim() || "";
      if (["transfer", "takeover"].includes(mode) && !reason) return setToast("请填写操作原因");
      if (mode === "takeover") {
        const previous = task.assignee;
        task.assignee = currentUser.name;
        if (task.status === "待分配") task.status = "审核中";
        taskLog(task, "接管任务", `${previous} → ${currentUser.name}；原因：${reason}。`);
        state.modal = null;
        return setToast("任务已接管");
      }
      const reviewer = document.getElementById("assign-reviewer")?.value;
      if (!task || !reviewer) return setToast("请选择审核人员");
      const previous = task.assignee;
      if (reviewer === previous) return setToast("不能分配给当前负责人");
      task.assignee = reviewer;
      if (task.status === "待分配") task.status = "审核中";
      taskLog(task, mode === "transfer" ? "转派任务" : "分配任务", `${previous} → ${reviewer}${reason ? `；原因：${reason}` : ""}。`);
      state.modal = null;
      setToast("任务负责人已更新");
    }

    function openTask(id) {
      const task = taskRecords.find(item => item.id === id);
      if (!task) return;
      state.selectedTaskId = id;
      if (task.kind === "kyb") {
        selectMerchant(task.merchantId);
        state.view = "kyb-detail";
      } else {
        state.view = "party-detail";
      }
      render();
    }

    function completePartyTask(note = "") {
      const task = currentTask();
      if (!task || task.kind !== "party") return;
      if (!canReview(task)) return setToast("请先领取或接管任务后再提交审核结论");
      task.status = "已完成";
      const noteText = note || document.getElementById("party-pass-note")?.value.trim() || "";
      taskLog(task, "通过收付款方", `${task.title} 已通过审核并启用。${noteText ? `内部备注：${noteText}` : ""}`);
      setToast("收付款方已启用");
    }

    function openPartyDecision(type) {
      const task = currentTask();
      if (!canReview(task)) return setToast("请先领取或接管任务后再提交审核结论");
      openModal(type);
    }

    function requestTaskTransfer(id) {
      const task = taskRecords.find(item => item.id === id);
      if (!canReview(task)) return setToast("只有当前负责人可以申请转派");
      openModal("request-transfer", id);
    }

    function syncKyBTask() {
      const task = taskRecords.find(item => item.kind === "kyb" && item.merchantId === state.selectedMerchantId);
      if (!task) return;
      task.status = state.kybStatus === "待补件" ? "需补件" : state.kybStatus === "已通过" || state.kybStatus === "已拒绝" ? "已完成" : "审核中";
      task.assignee = task.assignee === "待分配" ? "待分配" : currentMerchant().operator;
      task.updatedAt = "2026-07-10 10:04";
    }

    function setToast(message) {
      state.toast = message;
      render();
      window.clearTimeout(setToast.timer);
      setToast.timer = window.setTimeout(() => { state.toast = ""; render(); }, 2200);
    }

      state.userMenuOpen = false;

      state.toast = "";
      render();

    function login() {
      const account = document.getElementById("login-account")?.value.trim() || "";
      const password = document.getElementById("login-password")?.value || "";
      if (!account || !password) {
        state.loginError = "请输入账号和密码";
        render();
        return;
      }
      state.loginError = "";
      state.userMenuOpen = false;
      state.view = "merchants";
      setToast("登录成功");

    function renderLogin() {
      return `<main class="login-page"><section class="login-shell"><aside class="login-side"><div class="login-side-brand"><img class="login-logo" src="assets/settleflow-pay-mark.png" alt="SettleFlow Pay" /><div class="login-product">SettleFlow Pay</div><div class="login-brand-subtitle">管理后台</div></div></aside><section class="login-main"><section class="login-card"><div class="login-card-kicker">账户登录</div><h1>登录管理后台</h1><div class="login-form"><div class="login-field"><label for="login-account">登录账号</label><input class="input" id="login-account" type="text" autocomplete="username" placeholder="请输入登录账号" /></div><div class="login-field"><label for="login-password">登录密码</label><input class="input" id="login-password" type="password" autocomplete="current-password" placeholder="请输入登录密码" /></div><button class="button primary login-submit" type="button" data-action="login">登录</button></div>${state.loginError ? `<p class="login-error">${state.loginError}</p>` : ""}</section></section></section></main>`;
    }

    function renderShell(content) {
      return `<div class="app-shell"><aside class="sidebar"><div class="brand">${brand()}</div><nav class="nav"><button class="nav-item ${state.view === "merchants" ? "active" : ""}" data-action="view" data-view="merchants">${icon("building")}<span>企业主档</span></button><button class="nav-item ${["tasks", "kyb-detail", "party-detail"].includes(state.view) ? "active" : ""}" data-action="view" data-view="tasks">${icon("tasks")}<span>审核任务中心</span></button></nav></aside><div class="main-shell"><header class="topbar"><div class="topbar-product">SettleFlow Pay 管理后台</div><div class="topbar-right"><div class="profile-menu"><button class="profile-trigger" type="button" data-action="toggle-profile-menu" aria-expanded="${state.userMenuOpen}"><span class="topbar-user">${currentUser.name} · ${currentUser.role}</span><span class="avatar">王</span><span class="profile-caret">⌄</span></button>${state.userMenuOpen ? `<div class="profile-dropdown"><button type="button" data-action="logout">退出登录</button></div>` : ""}</div></div></header>${content}</div></div>`;
    }

    function matchesTask(task) {
      const merchant = taskMerchant(task);
      const keyword = state.taskKeyword.trim().toLowerCase();
      const matchesKeyword = !keyword || `${task.id} ${task.type} ${task.title} ${task.assignee} ${merchant.name} ${merchant.id}`.toLowerCase().includes(keyword);
      const matchesStatus = state.taskCenterStatus === "全部" || state.taskCenterStatus === "我的待办" ? state.taskCenterStatus === "全部" || (task.assignee === currentUser.name && !isTerminalTask(task)) : task.status === state.taskCenterStatus;
      const matchesType = state.taskType === "全部" || task.type === state.taskType;
      const matchesRisk = state.taskRisk === "全部" || task.risk === state.taskRisk;
      return matchesKeyword && matchesStatus && matchesType && matchesRisk;
    }

    function taskTabs() {
      return ["全部", "我的待办", "待分配", "审核中", "需补件", "已完成"];
    }

    function taskTabCount(tab) {
      if (tab === "全部") return taskRecords.length;
      if (tab === "我的待办") return taskRecords.filter(task => task.assignee === currentUser.name && !isTerminalTask(task)).length;
      return taskRecords.filter(task => task.status === tab).length;
    }

    function taskRowActions(task) {
      const primary = `<button class="link-button" data-action="task-detail" data-id="${task.id}">${isTerminalTask(task) ? "查看详情" : "进入审核"}</button>`;
      if (isTerminalTask(task)) return primary;
      if (task.assignee === "待分配") {
        const claim = canClaim(task) ? `<button class="link-button" data-action="claim-task" data-id="${task.id}">领取</button>` : "";
        const assign = canManageAssignments() ? `<button class="link-button" data-action="assign-task" data-id="${task.id}">分配</button>` : "";
        return `${primary}${claim}${assign}`;
      }
      if (task.assignee === currentUser.name) {
        return `${primary}${canManageAssignments() ? `<button class="link-button" data-action="assign-task" data-id="${task.id}" data-mode="transfer">转派</button>` : `<button class="link-button" data-action="request-transfer" data-id="${task.id}">申请转派</button>`}`;
      }
      return canManageAssignments() ? `${primary}<button class="link-button" data-action="assign-task" data-id="${task.id}" data-mode="takeover">接管</button>` : primary;
    }

    function renderTaskCenter() {
      const openCount = taskRecords.filter(task => !isTerminalTask(task)).length;

      return renderShell(`<main class="page"><div class="page-title-row"><div><h1 class="page-title">审核任务中心</h1></div></div><section class="panel task-summary"><div class="stat"><span>待处理任务</span><strong>${openCount}</strong></div><div class="stat"><span>待分配</span><strong>${unassignedCount}</strong></div><div class="stat"><span>需补件</span><strong>${supplementCount}</strong></div><div class="stat"><span>已超时</span><strong>${overdueCount}</strong></div></section><section class="panel task-table"><div class="task-toolbar"><h2>审核任务</h2><div class="task-toolbar-meta"><span>当前用户：${currentUser.name}</span><span>${currentUser.role}</span></div></div><div class="task-tabs">${taskTabs().map(tab => `<button class="task-tab ${state.taskCenterStatus === tab ? "active" : ""}" data-action="task-tab" data-tab="${tab}">${tab}<span class="task-tab-count">${taskTabCount(tab)}</span></button>`).join("")}</div><div class="task-filters"><div class="filter-field"><label>任务 / 企业</label><input class="input" data-input="task-search" value="${state.taskKeyword}" placeholder="输入任务号、企业或收付款方" /></div><div class="filter-field"><label>任务类型</label><select class="select" data-input="task-type"><option ${state.taskType === "全部" ? "selected" : ""}>全部</option><option ${state.taskType === "KYB 审核" ? "selected" : ""}>KYB 审核</option><option ${state.taskType === "收付款方审核" ? "selected" : ""}>收付款方审核</option></select></div><div class="filter-field"><label>风险等级</label><select class="select" data-input="task-risk"><option ${state.taskRisk === "全部" ? "selected" : ""}>全部</option><option ${state.taskRisk === "中风险" ? "selected" : ""}>中风险</option><option ${state.taskRisk === "低风险" ? "selected" : ""}>低风险</option><option ${state.taskRisk === "高风险" ? "selected" : ""}>高风险</option></select></div><div class="filter-actions"><button class="button" data-action="reset-task-filter">重置</button></div></div><div class="table-wrap"><table><thead><tr><th>企业 / 审核对象</th><th>任务类型</th><th>状态</th><th>风险</th><th>当前审核员</th><th>SLA</th><th>更新时间</th><th>操作</th></tr></thead><tbody>${filtered.length ? filtered.map(task => { const merchant = taskMerchant(task); return `<tr><td class="task-subject"><strong>${task.title}</strong><span class="secondary">${merchant.name} · ${merchant.region}</span></td><td>${task.type}<span class="secondary">${task.kind === "party" ? `${task.partyType} · ${task.product}` : task.id}</span></td><td>${tag(task.status)}</td><td>${tag(task.risk)}</td><td><span class="task-owner ${task.assignee === "待分配" ? "unassigned" : ""}">${task.assignee}</span></td><td><span class="task-sla ${task.sla.includes("超时") ? "overdue" : ""}">${task.sla}</span></td><td>${task.updatedAt}</td><td><div class="task-actions">${taskRowActions(task)}</div></td></tr>`; }).join("") : `<tr><td colspan="8" style="text-align:center;color:#64748b;padding:34px">未找到匹配任务</td></tr>`}</tbody></table></div></section></main>`);
    }

    function renderAssignmentModal() {
      const task = taskRecords.find(item => item.id === state.modal.id);
      if (!task) return "";
      const takeover = state.modal.mode === "takeover";
      const transfer = state.modal.mode === "transfer";
      const title = takeover ? "接管任务" : transfer ? "转派任务" : "分配任务";
      const reason = transfer || takeover ? `<div class="field"><label>操作原因</label><textarea class="textarea" id="assignment-reason" placeholder="请输入操作原因"></textarea></div>` : "";
      const body = takeover ? `<div class="modal-callout">当前任务由 ${task.assignee} 负责。接管后，任务将由 ${currentUser.name} 继续审核，原负责人会保留在操作记录中。</div>${reason}` : `<div class="field"><label>当前审核员</label><div class="modal-callout">${task.assignee}</div></div><div class="field"><label>选择审核人员</label><select class="select" id="assign-reviewer">${reviewerRoster.map(reviewer => `<option value="${reviewer.name}" ${reviewer.name === task.assignee ? "selected" : ""}>${reviewer.name} · ${reviewer.role} · ${reviewer.workload} 项待处理</option>`).join("")}</select></div>${reason}`;
      return `<div class="modal-mask assignment-mask"><section class="modal assignment-drawer"><div class="assignment-head"><div><div class="assignment-kicker">任务操作</div><h2>${title}</h2><p>${task.title} · ${taskMerchant(task).name}</p></div><button class="assignment-close" type="button" data-action="close-modal" aria-label="关闭" title="关闭">×</button></div><div class="assignment-body"><div class="modal-fields">${body}</div></div><div class="modal-actions assignment-footer"><button class="button" data-action="close-modal">取消</button><button class="button primary" data-action="confirm-assignment">确认${title}</button></div></section></div>`;
    }

    function renderPartyDetail() {
      const task = currentTask();
      if (!task) return renderTaskCenter();
      const merchant = taskMerchant(task);
      const logs = task.logs || [{ time: task.updatedAt, title: "创建审核任务", copy: `${task.title} 已进入审核任务中心。`, user: "系统" }];

      const terminal = isTerminalTask(task);
      const assignmentActions = task.assignee === "待分配"
        ? `${canClaim(task) ? `<button class="button primary" data-action="claim-task" data-id="${task.id}">领取任务</button>` : ""}${canManageAssignments() ? `<button class="button" data-action="assign-task" data-id="${task.id}">分配任务</button>` : ""}`

          ? canManageAssignments() ? `<button class="button" data-action="assign-task" data-id="${task.id}" data-mode="transfer">转派任务</button>` : `<button class="button" data-action="request-transfer" data-id="${task.id}">申请转派</button>`
          : canManageAssignments() && !terminal ? `<button class="button" data-action="assign-task" data-id="${task.id}" data-mode="takeover">接管任务</button>` : "";

ls.filter(item => item.group === group.id).length}</span></button>`).join("")}</div>${state.activeTab === "history" ? renderHistory() : reviewItems()}</section><aside class="decision-panel"><h2>审核结论</h2><div class="metric-list"><div class="metric"><span>待处理材料</span><strong>${materialStats.pending}</strong></div><div class="metric"><span>需补件材料</span><strong>${materialStats.supplement}</strong></div><div class="metric"><span>已驳回材料</span><strong>${materialStats.rejected}</strong></div><div class="metric"><span>客户风险评级</span><strong>${merchant.risk}</strong></div><div class="metric"><span>当前负责人</span><strong>${kybTask?.assignee || merchant.operator}</strong></div></div><div class="note"><label>内部审核备注</label><textarea class="textarea" data-input="internal-note">${state.internalNote}</textarea></div><div class="decision-actions"><button class="button primary" data-action="approve-kyb" ${canApprove ? "" : "disabled"}>通过 KYB</button><button class="button" data-action="launch-supplement">发起补件</button><button class="button danger" data-action="reject-kyb">拒绝 KYB</button></div></aside></div></main>`);

    function escapePdfText(value) {
      return String(value).replace(/\\/g, "\\\\").replace(/\(/g, "\\(").replace(/\)/g, "\\)");
    }

    function buildPdf(fileName, title) {
      const lines = ["KYB REVIEW FILE", title, fileName, "Generated for prototype review"];
      const stream = lines.map((line, index) => `BT /F1 ${index === 0 ? 18 : 12} Tf 72 ${740 - index * 34} Td (${escapePdfText(line)}) Tj ET`).join("\n");
      const objects = [
        "1 0 obj << /Type /Catalog /Pages 2 0 R >> endobj",
        "2 0 obj << /Type /Pages /Kids [3 0 R] /Count 1 >> endobj",
        "3 0 obj << /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 4 0 R >> >> /Contents 5 0 R >> endobj",
        "4 0 obj << /Type /Font /Subtype /Type1 /BaseFont /Helvetica >> endobj",
        `5 0 obj << /Length ${stream.length} >> stream\n${stream}\nendstream endobj`
      ];
      let pdf = "%PDF-1.4\n";
      const offsets = [0];
      objects.forEach(object => { offsets.push(pdf.length); pdf += `${object}\n`; });
      const xref = pdf.length;
      pdf += `xref\n0 ${objects.length + 1}\n0000000000 65535 f \n`;
      offsets.slice(1).forEach(offset => { pdf += `${String(offset).padStart(10, "0")} 00000 n \n`; });
      pdf += `trailer << /Size ${objects.length + 1} /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`;
      return new Blob([pdf], { type: "application/pdf" });
    }

    function downloadFile(id) {
      const meta = fileReviewData[id];
      const material = state.materials.find(item => item.id === id);
      if (!meta) return;
      const fileName = material?.value || meta.fileName;
      const url = URL.createObjectURL(buildPdf(fileName, meta.title));
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      setToast("文件已下载");
    }

      if (state.modal.type === "reject-case") {
        state.kybStatus = "已拒绝";
        state.capabilities.forEach(item => item.status = "已暂停");
        addLog("拒绝 KYB", `商户可见说明：${publicText}。内部备注：${internalText || "未填写"}`);
        syncSelectedMerchant();
        state.modal = null;
        return setToast("KYB 已拒绝，商户端已同步状态");
      }
      const material = state.materials.find(item => item.id === state.modal.id);
      material.status = state.modal.type === "reject" ? "已驳回" : "需补件";
      material.validation = state.modal.type === "reject" ? "材料已驳回，等待商户处理" : "已加入补件清单，等待统一发起补件";
      material.tone = state.modal.type === "reject" ? "fail" : "warn";
      addLog(state.modal.type === "reject" ? "驳回材料" : "加入补件清单", `${material.name}；商户可见说明：${publicText}。${internalText ? "内部备注已记录。" : ""}`);
      state.modal = null;
      syncSelectedMerchant();
      setToast(state.modal ? "" : "材料处理结果已保存");
    }

    document.addEventListener("click", event => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const action = target.dataset.action;
      if (action === "toggle-profile-menu") { state.userMenuOpen = !state.userMenuOpen; render(); }
      if (action === "logout") logout();
      if (action === "login") login();
      if (action === "view") { state.userMenuOpen = false; state.view = target.dataset.view; render(); }
      if (action === "review") { selectMerchant(target.dataset.id || state.selectedMerchantId); state.selectedTaskId = `KYB-${currentMerchant().reviewId.split("KYB-")[1]}`; state.view = "kyb-detail"; render(); }
      if (action === "task-tab") { state.taskCenterStatus = target.dataset.tab; render(); }
      if (action === "task-detail") openTask(target.dataset.id);
      if (action === "claim-task") claimTask(target.dataset.id);
      if (action === "assign-task") openAssignment(target.dataset.id, target.dataset.mode || "assign");
      if (action === "request-transfer") requestTaskTransfer(target.dataset.id);
      if (action === "confirm-assignment") confirmAssignment();
      if (action === "party-pass") openPartyDecision("party-pass");
      if (action === "party-supplement") openPartyDecision("party-supplement");
      if (action === "party-reject") openPartyDecision("party-reject");
      if (action === "back-to-tasks") { state.view = "tasks"; state.modal = null; render(); }
      if (action === "party-file") setToast(`${target.dataset.file} 已打开`);
      if (action === "tab") { state.activeTab = target.dataset.tab; render(); }
      if (action === "file-review") openModal("file-review", target.dataset.id);
      if (action === "download-file") downloadFile(target.dataset.id);
      if (action === "pass-material") passMaterial(target.dataset.id);
      if (action === "file-pass") { state.modal = null; passMaterial(target.dataset.id); }
      if (action === "supplement-material") openModal("supplement", target.dataset.id);
      if (action === "file-supplement") { state.modal = null; openModal("supplement", target.dataset.id); }
      if (action === "reject-material") openModal("reject", target.dataset.id);
      if (action === "file-reject") { state.modal = null; openModal("reject", target.dataset.id); }
      if (action === "launch-supplement") openModal("launch");
      if (action === "reject-kyb") openModal("reject-case");
      if (action === "close-modal") { state.modal = null; render(); }
      if (action === "confirm-modal") confirmModal();
      if (action === "approve-kyb") { state.kybStatus = "已通过"; state.capabilities.forEach(item => item.status = "待开通"); addLog("通过 KYB", "KYB 准入已通过；产品能力进入待开通状态，商户端不会自动解锁付款或收款。" ); syncSelectedMerchant(); setToast("KYB 已通过，能力待开通"); }
      if (action === "search") render();
      if (action === "reset-search") { state.keyword = ""; state.merchantStatus = "全部"; state.merchantRisk = "全部"; render(); }
      if (action === "reset-task-filter") { state.taskCenterStatus = "全部"; state.taskKeyword = ""; state.taskType = "全部"; state.taskRisk = "全部"; render(); }
    });
    document.addEventListener("input", event => {
      if (event.target.dataset.input === "merchant-search") state.keyword = event.target.value;
      if (event.target.dataset.input === "task-search") state.taskKeyword = event.target.value;
      if (event.target.dataset.input === "internal-note") state.internalNote = event.target.value;
    });
    document.addEventListener("change", event => {
      if (event.target.dataset.input === "merchant-status") { state.merchantStatus = event.target.value; render(); }
      if (event.target.dataset.input === "merchant-risk") { state.merchantRisk = event.target.value; render(); }
      if (event.target.dataset.input === "task-type") { state.taskType = event.target.value; render(); }
      if (event.target.dataset.input === "task-risk") { state.taskRisk = event.target.value; render(); }
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Enter" && ["login-account", "login-password"].includes(event.target.id)) {
        event.preventDefault();
        if (event.target.id === "login-account") {
          document.getElementById("login-password")?.focus();
          return;
        }
        login();
      }
      if (event.key === "Enter" && event.target.dataset.input === "merchant-search") {
        event.preventDefault();
        render();
      }
      if (event.key === "Enter" && event.target.dataset.input === "task-search") {
        event.preventDefault();
        render();
      }
      if (event.key === "Escape" && state.modal) {
        state.modal = null;
        render();
      }
    });

    render();
  </script>
</body>
</html>
